window.sumFields = (fieldsToSum, inputs) => {
  // 'acc' is the running total
  // 'item' is the current Object from your array (e.g. { name: 'field1', matchValue: '5' })
  const total = fieldsToSum.reduce((acc, item) => {
    
    const fieldName = item.name; 
    const valueToCheck = item.matchValue; 
    const field = inputs[fieldName];
    if (!field) return acc;

    let actualValue = null; debugger
    // We check if the value is an array where value == 'on'.
    if (Array.isArray(field.value)) {
      const foundObject = field.value.find(x => x.value == 'on');
      actualValue = foundObject ? foundObject.name : null;
    } else {
      actualValue = field.value;
    }

    // Check if the extracted value matches your criteria
    if (actualValue == valueToCheck) {
      return acc + 1;
    }

    return acc;
  }, 0); 

  return total.toString();
};
